# HTTP server — redirect everything to HTTPS, except the ACME challenge
# path which certbot needs unencrypted access to for renewals.
server {
  listen 80;
  server_name wangpan.ftwecg.uk _;

  # Let's Encrypt cert renewal challenge — served plain over HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Everything else → HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS server — the real application
server {
  listen 443 ssl;
  http2 on;
  server_name wangpan.ftwecg.uk;

  ssl_certificate     /etc/letsencrypt/live/wangpan.ftwecg.uk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/wangpan.ftwecg.uk/privkey.pem;
  # Modern + intermediate compatibility
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # HSTS: tell browsers to always use HTTPS for this host
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  root /usr/share/nginx/html;
  index index.html;

  # Single-chunk PUT body (default 8 MiB, server hard cap 64 MiB).
  # Large overall files travel as many of these small PUTs.
  client_max_body_size 80m;
  proxy_request_buffering off;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;

  location /api/ {
    proxy_pass http://api:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Stream upstream responses through to the client without holding them in
    # nginx's small buffers (default 8KB). Critical for large file downloads.
    proxy_buffering off;
    proxy_http_version 1.1;
  }

  location ~* \.mjs$ {
    types {
      application/javascript mjs;
    }
    default_type application/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /index.html =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
