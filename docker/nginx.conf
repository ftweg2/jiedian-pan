server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Single-chunk PUT body (default 8 MiB, server hard cap 64 MiB).
  # Large overall files travel as many of these small PUTs.
  client_max_body_size 80m;
  proxy_request_buffering off;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;

  location /api/ {
    proxy_pass http://api:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Stream upstream responses through to the client without holding them in
    # nginx's small buffers (default 8KB). Critical for large file downloads.
    proxy_buffering off;
    proxy_http_version 1.1;
  }

  # ONLYOFFICE Document Server. The browser loads the editor UI from
  # /onlyoffice/web-apps/.../api.js and the editor itself iframes more URLs
  # under /onlyoffice/. The trailing-slash form strips /onlyoffice from
  # upstream URLs so the document server sees its own root.
  location /onlyoffice/ {
    proxy_pass http://onlyoffice/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # ONLYOFFICE uses websockets for the live-editing collab channel.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location ~* \.mjs$ {
    types {
      application/javascript mjs;
    }
    default_type application/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files /index.html =404;
  }

  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
