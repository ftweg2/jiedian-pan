services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wangpan
      POSTGRES_USER: wangpan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wangpan -d wangpan"]
      interval: 10s
      timeout: 5s
      retries: 5

  storage-agent-local:
    build:
      context: .
      dockerfile: docker/storage-agent.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4010
      HOST: 0.0.0.0
      NODE_ID: main-local
      AGENT_TOKEN: ${LOCAL_AGENT_TOKEN:?LOCAL_AGENT_TOKEN is required}
      AGENT_DATA_DIR: /data/objects
    volumes:
      - local-agent-data:/data/objects
    expose:
      - "4010"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      storage-agent-local:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://wangpan:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/wangpan
      APP_MASTER_KEY: ${APP_MASTER_KEY:?APP_MASTER_KEY is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-14}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?BOOTSTRAP_ADMIN_EMAIL is required}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
      BOOTSTRAP_LOCAL_NODE_NAME: ${BOOTSTRAP_LOCAL_NODE_NAME:-main-local}
      BOOTSTRAP_LOCAL_NODE_URL: ${BOOTSTRAP_LOCAL_NODE_URL:-http://storage-agent-local:4010}
      BOOTSTRAP_LOCAL_NODE_TOKEN: ${LOCAL_AGENT_TOKEN:?LOCAL_AGENT_TOKEN is required}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-}
      ONLYOFFICE_INTERNAL_API_URL: ${ONLYOFFICE_INTERNAL_API_URL:-http://api:4000}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  # ONLYOFFICE Document Server: provides the in-browser Word/Excel/PPT editor.
  # We only use the Word piece (docx) for now. The web nginx reverse-proxies
  # /onlyoffice/* to here so the browser sees everything under one origin.
  # The container talks to our API by hostname `api:4000` (same docker net).
  #
  # JWT: both sides share ONLYOFFICE_JWT_SECRET. The API signs the config it
  # hands to ONLYOFFICE; ONLYOFFICE signs the callback it sends back. We
  # verify the callback with the same secret.
  onlyoffice:
    image: onlyoffice/documentserver:8.2
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET is required}
      JWT_HEADER: "Authorization"
      # Run with no extra DB / cache services — single-node mode is fine
      # for a personal cloud (one editor at a time per doc).
      USE_UNAUTHORIZED_STORAGE: "true"
    expose:
      - "80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-cache:/var/lib/onlyoffice

volumes:
  postgres-data:
  local-agent-data:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-cache:
